# ============================================================
# PASTE VÀO aaPanel → Website → pro.agi.vn → Cấu hình (Config)
# Đặt TRƯỚC block `location /` hoặc `location ~ \.php`
# Sau đó: Save → Reload nginx
# ============================================================

# --- Auth (sửa lỗi 404 đăng ký / đăng nhập) ---
location = /api/auth/login {
    rewrite ^ /api/platform/login.php last;
}
location = /api/auth/register {
    rewrite ^ /api/platform/register.php last;
}
location = /api/auth/me {
    rewrite ^ /api/platform/me.php last;
}

# --- Credits ---
location = /api/credits/transfer {
    rewrite ^ /api/platform/transfer.php last;
}
location = /api/credits/grant {
    rewrite ^ /api/platform/grant.php last;
}

# --- Jobs ---
location = /api/jobs/models {
    rewrite ^ /api/platform/job-models.php last;
}
location = /api/jobs/create {
    rewrite ^ /api/platform/job-create.php last;
}
location = /api/jobs/poll {
    rewrite ^ /api/platform/job-poll.php last;
}
location = /api/jobs/list {
    rewrite ^ /api/platform/job-list.php last;
}
location = /api/jobs/delete {
    rewrite ^ /api/platform/job-delete.php last;
}

# --- Credit packages (PHP bridge — không cần Node) ---
location = /api/payos/credit-packages {
    rewrite ^ /api/platform/credit-packages.php last;
}
location = /api/pay2s/credit-packages {
    rewrite ^ /api/platform/credit-packages.php last;
}

# --- Node API (Pay2S topup/payment, Gommo proxy /v2 /ai) — cần PM2 port 3001 ---
location /api/pay2s/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location /api/payos/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
