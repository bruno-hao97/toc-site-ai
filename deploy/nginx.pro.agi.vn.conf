# Nginx cho pro.agi.vn — copy vào aaPanel / sites-enabled
# Cách 1 (khuyên dùng): proxy /api, /ai, /v2 sang Node, static giữ trên nginx

server {
    listen 80;
    listen 443 ssl http2;
    server_name pro.agi.vn;

    # Đường dẫn build frontend (sửa theo VPS)
    root /www/wwwroot/pro.agi.vn/dist;
    index index.html;

    # SSL — aaPanel tự sinh, giữ block ssl hiện có của bạn

    # API Node (port 3001 — pm2 ecosystem)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ai/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /v2/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

